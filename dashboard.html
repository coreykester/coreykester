<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Dashboard - La Bodega Online</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="black-bar">
            <h1>La Bodega Online</h1>
        </div>
        <div class="dashboard-container">
            <div class="dashboard-content">
                <h2>Welcome, <span id="username-display">User</span>!</h2>
                <p>You have successfully logged in.</p>
                <button id="logoutBtn" class="login-button">Logout</button>
            </div>
        </div>

        <script>
            function getBasePath() {
                const path = window.location.pathname;
                return path.includes('/coreykester.com/') ? '/coreykester.com/' : './';
            }

            document.addEventListener('DOMContentLoaded', function() {
                const username = localStorage.getItem('currentUser');
                if (!username) {
                    window.location.href = getBasePath() + 'index.html';
                    return;
                }
                document.getElementById('username-display').textContent = username;

                document.getElementById('logoutBtn').addEventListener('click', function() {
                    localStorage.removeItem('currentUser');
                    window.location.href = getBasePath() + 'index.html';
                });
            });
        </script>
    </body>
</html>
