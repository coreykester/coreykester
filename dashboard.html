<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard - La Bodega Online</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="black-bar">
            <h1>La Bodega Online</h1>
        </div>
        <div class="dashboard-container">
            <div class="dashboard-content">
                <h2>Welcome, <span id="username-display">User</span>!</h2>
                <p>You have successfully logged in.</p>
                <button onclick="logout()" class="login-button">Logout</button>
            </div>
        </div>
        <script>
            function getBasePath() {
                const path = window.location.pathname;
                if (path.includes('/coreykester.com/')) {
                    return '/coreykester.com/';
                }
                return './';
            }

            document.addEventListener('DOMContentLoaded', function() {
                const username = localStorage.getItem('currentUser');
                if (!username) {
                    window.location.href = getBasePath() + 'index.html';
                } else {
                    document.getElementById('username-display').textContent = username;
                }
            });
            
            function logout() {
                localStorage.removeItem('currentUser');
                window.location.href = getBasePath() + 'index.html';
            }
        </script>
    </body>
</html>
